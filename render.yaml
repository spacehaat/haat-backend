# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect haat-backend repo

services:
  - type: web
    name: spacehaat-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: 30
      - key: COOKIE_NAME
        value: spacehaat_token
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        value: ""
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_FOLDER
        value: inventory
      - key: AWS_S3_PUBLIC_URL
        sync: false
